services:
  frontend:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: app_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_INTERNAL_URL: http://backend:8000
      PUBLIC_API_URL: /api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net

  backend:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER}/backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: app_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\" || python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net

  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.7.0
    container_name: app_loki
    restart: unless-stopped
    profiles:
      - monitoring
    command: ["--config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./infra/monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    networks:
      - monitoring_net

  alloy:
    image: grafana/alloy:latest
    container_name: app_alloy
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./infra/monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${ALLOY_PORT:-12345}:12345"
    depends_on:
      - loki
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: app_grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - loki
    networks:
      - monitoring_net

networks:
  frontend_net:
    name: app_frontend_net
    driver: bridge

  backend_net:
    name: app_backend_net
    driver: bridge

  monitoring_net:
    name: app_monitoring_net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  loki_data:
  alloy_data:
